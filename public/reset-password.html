<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور - Absi stor</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f8fafc;
        }
        
        .reset-card {
            background: white;
            padding: 2rem;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        input {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ddd;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #1a4a6f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .message {
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        body.dark-mode .reset-card {
            background: #1e1e1e;
            color: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <h2>🔐 إعادة تعيين كلمة المرور</h2>
        <div id="requestForm">
            <p>أدخل بريدك الإلكتروني لإرسال رابط إعادة التعيين</p>
            <input type="email" id="resetEmail" placeholder="البريد الإلكتروني">
            <button onclick="requestReset()">إرسال الرابط</button>
            <div id="requestMsg" class="message"></div>
        </div>
        <div id="resetForm" style="display: none;">
            <p>أدخل كلمة المرور الجديدة</p>
            <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
            <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
            <button onclick="submitReset()">تغيير كلمة المرور</button>
            <div id="resetMsg" class="message"></div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('requestForm').style.display = 'none';
            document.getElementById('resetForm').style.display = 'block';
        } else {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('requestForm').style.display = 'block';
        }

        async function requestReset() {
            const email = document.getElementById('resetEmail').value;
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email
                })
            });
            const data = await res.json();
            const msgDiv = document.getElementById('requestMsg');
            if (data.success) {
                msgDiv.style.color = 'green';
                msgDiv.innerText = 'تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني';
            } else {
                msgDiv.style.color = 'red';
                msgDiv.innerText = data.error || 'حدث خطأ';
            }
        }

        async function submitReset() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) {
                document.getElementById('resetMsg').innerText = 'كلمتا المرور غير متطابقتين';
                return;
            }
            if (password.length < 6) {
                document.getElementById('resetMsg').innerText = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                return;
            }
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    token,
                    newPassword: password
                })
            });
            const data = await res.json();
            if (data.success) {
                alert('تم تغيير كلمة المرور بنجاح، يمكنك تسجيل الدخول الآن');
                window.location.href = '/login.html';
            } else {
                document.getElementById('resetMsg').innerText = data.error;
            }
        }

        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    </script>
</body>

</html>
