<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>فاتورة الطلب - Absi Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }
        
        .invoice-box {
            max-width: 800px;
            margin: auto;
            padding: 2rem;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .details {
            margin-bottom: 1.5rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        
        th,
        td {
            border: 1px solid #ccc;
            padding: 0.5rem;
            text-align: center;
        }
        
        .total {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
            text-align: left;
        }
        
        @media print {
            body {
                margin: 0;
            }
            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="invoice-box">
        <div class="header">
            <h1>فاتورة شراء</h1>
            <p>Absi Store - شكراً لتسوقك معنا</p>
        </div>
        <div class="details" id="invoiceData">
            <!-- سيتم تعبئتها ديناميكياً عبر API -->
        </div>
        <button class="no-print" onclick="window.print()">🖨️ طباعة</button>
    </div>
    <script>
        // يأتي المحتوى من API عبر تمرير البيانات إلى window
        function renderInvoice(order) {
            const container = document.getElementById('invoiceData');
            container.innerHTML = `
                <p><strong>رقم الطلب:</strong> ${order.orderId}</p>
                <p><strong>التاريخ:</strong> ${new Date(order.date).toLocaleString()}</p>
                <p><strong>العميل:</strong> ${order.customerName} - ${order.customerPhone} - ${order.customerAddress}</p>
                <h3>المنتجات</h3>
                <table>
                    <tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                    ${order.items.map(item => `<tr><td>${item.name}</td><td>${item.quantity}</td><td>${item.price}</td><td>${item.quantity * item.price}</td></tr>`).join('')}
                </table>
                <div class="total">الإجمالي: ${order.total} ج.م</div>
                <p>شكراً لتسوقك معنا</p>
            `;
        }
        if (window.orderData) renderInvoice(window.orderData);
    </script>
</body>

</html>
