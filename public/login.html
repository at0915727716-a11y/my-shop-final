<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دخول المدير - Absi stor</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HFDD8Q8VFG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());
        gtag('config', 'G-HFDD8Q8VFG');
    </script>
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a4a6f">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <!-- Styles -->
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* الأنماط الأصلية مع تحسينات للتوافق مع الميزات الجديدة */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2b3d, #1a4a6f);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 0.3s;
        }
        
        body.dark-mode {
            background: #121212;
        }
        
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 32px;
            width: 360px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: background 0.3s, color 0.3s;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        h1 {
            color: #1a4a6f;
            margin-bottom: 0.5rem;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #1a4a6f;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        button:hover {
            background: #0f2b3d;
        }
        
        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .info-message {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #2a5298;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }
        
        @media (max-width: 480px) {
            .login-card {
                width: 90%;
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">🏪</div>
        <h1>Absi stor</h1>
        <p>لوحة تحكم المدير</p>
        <input type="text" id="username" placeholder="اسم المستخدم" value="admin">
        <input type="password" id="password" placeholder="كلمة المرور" value="admin123">
        <button onclick="login()">تسجيل الدخول</button>
        <div class="error" id="errorMsg"></div>
        <!-- إضافة معلومات بسيطة عن الميزات الجديدة (اختياري) -->
        <div class="info-message">
            <i class="fas fa-chart-line"></i> لوحة تحكم متقدمة |
            <i class="fas fa-gift"></i> نقاط ولاء |
            <i class="fas fa-truck"></i> شحن متعدد
        </div>
    </div>

    <!-- أزرار إضافية (وضع ليلي + واتساب) -->
    <div class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</div>
    <a href="https://wa.me/218915727716?text=مرحباً، أواجه مشكلة في تسجيل الدخول إلى لوحة تحكم Absi stor" target="_blank" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // ========== الوضع الليلي و Service Worker ==========
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.log('Service Worker failed', err));
        }

        // ========== تسجيل الدخول الأصلي ==========
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    password
                })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/admin.html';
            } else {
                document.getElementById('errorMsg').innerText = data.error || 'بيانات غير صحيحة';
            }
        }
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // ربط الدوال العامة
        window.toggleDarkMode = toggleDarkMode;
        window.login = login;
    </script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>

</html>
