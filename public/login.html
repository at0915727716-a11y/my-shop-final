<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول المدير - Absi stor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2b3d, #1a4a6f);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 32px;
            width: 360px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        
        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        h1 {
            color: #1a4a6f;
            margin-bottom: 0.5rem;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #1a4a6f;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        button:hover {
            background: #0f2b3d;
        }
        
        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">🏪</div>
        <h1>Absi stor</h1>
        <p>لوحة تحكم المدير</p>
        <input type="text" id="username" placeholder="اسم المستخدم" value="admin">
        <input type="password" id="password" placeholder="كلمة المرور" value="admin123">
        <button onclick="login()">تسجيل الدخول</button>
        <div class="error" id="errorMsg"></div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    password
                })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/admin.html';
            } else {
                document.getElementById('errorMsg').innerText = data.error || 'بيانات غير صحيحة';
            }
        }
        // Enter key
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>

</html>
