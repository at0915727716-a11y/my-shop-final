<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكمي - Absi Store</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .stat-card h3 {
            margin: 0 0 0.5rem;
            color: #333;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #007bff;
        }
        
        .orders-list {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .order-item {
            border-bottom: 1px solid #eee;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .btn-print {
            background: #28a745;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        
        .btn-change-password {
            background: #ffc107;
            color: #333;
            margin-top: 1rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1200;
        }
        
        .modal-content {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        
        @media print {
            .no-print {
                display: none;
            }
        }
        
        body.dark-mode .stat-card,
        body.dark-mode .orders-list,
        body.dark-mode .modal-content {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        
        body.dark-mode .stat-card h3 {
            color: #ffc107;
        }
        
        body.dark-mode .stat-card .value {
            color: #ffc107;
        }
        
        body.dark-mode .btn-print {
            background: #2a5298;
        }
        
        body.dark-mode .btn-change-password {
            background: #f39c12;
            color: #1e1e1e;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <h1>مرحباً، <span id="userName"></span> 👋</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>🛍️ الطلبات</h3>
                <div class="value" id="ordersCount">0</div>
            </div>
            <div class="stat-card">
                <h3>⭐ نقاط الولاء</h3>
                <div class="value" id="loyaltyPoints">0</div>
            </div>
            <div class="stat-card">
                <h3>❤️ المفضلة</h3>
                <div class="value" id="wishlistCount">0</div>
            </div>
            <div class="stat-card">
                <h3>🏠 عنواني الرئيسي</h3>
                <div class="value" id="defaultAddress">—</div>
            </div>
        </div>
        <div class="orders-list">
            <h2>طلباتي الأخيرة</h2>
            <div id="ordersList"></div>
            <button id="changePasswordBtn" class="btn-change-password no-print">🔑 تغيير كلمة المرور</button>
        </div>
    </div>

    <!-- مودال تغيير كلمة المرور -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <span style="float:left; cursor:pointer" onclick="closePasswordModal()">&times;</span>
            <h3>تغيير كلمة المرور</h3>
            <div class="form-group">
                <label>كلمة المرور الحالية</label>
                <input type="password" id="currentPassword">
            </div>
            <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <input type="password" id="newPassword">
            </div>
            <button onclick="submitPasswordChange()" class="btn-print">تحديث</button>
            <div id="passwordMsg" style="margin-top:0.5rem; color:red;"></div>
        </div>
    </div>

    <script>
        // === دوال مساعدة ===
        async function fetchJSON(url, options = {}) {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        // === تحميل بيانات لوحة التحكم ===
        async function loadDashboard() {
            try {
                // جلب بيانات المستخدم من مسار dashboard/profile
                const profile = await fetchJSON('/api/dashboard/profile');
                document.getElementById('userName').innerText = profile.username || profile.name || 'عميل';
                document.getElementById('loyaltyPoints').innerText = profile.loyaltyPoints || 0;
                document.getElementById('defaultAddress').innerText = profile.defaultAddress || 'لم يحدد';

                // جلب المفضلة
                const wishlistData = await fetchJSON('/api/dashboard/wishlist');
                const wishlistCount = Array.isArray(wishlistData) ? wishlistData.length : (wishlistData.data ? wishlistData.data.length : 0);
                document.getElementById('wishlistCount').innerText = wishlistCount;

                // جلب الطلبات
                const orders = await fetchJSON('/api/dashboard/my-orders');
                document.getElementById('ordersCount').innerText = orders.length;
                const ordersHtml = orders.map(order => `
                    <div class="order-item">
                        <div>
                            <strong>${order.orderId}</strong><br>
                            ${new Date(order.date).toLocaleDateString()} - ${order.total} ريال<br>
                            الحالة: ${order.status}
                        </div>
                        <button class="btn-print no-print" onclick="printInvoice('${order.orderId}')">🖨️ طباعة الفاتورة</button>
                    </div>
                `).join('');
                document.getElementById('ordersList').innerHTML = ordersHtml || '<p>لا توجد طلبات بعد</p>';
            } catch (err) {
                console.error(err);
                document.getElementById('ordersList').innerHTML = '<div class="alert alert-danger">حدث خطأ في تحميل البيانات. تأكد من تسجيل الدخول.</div>';
            }
        }

        // طباعة الفاتورة
        function printInvoice(orderId) {
            window.open(`/api/orders/${orderId}/print`, '_blank');
        }

        // === تغيير كلمة المرور ===
        function openPasswordModal() {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('passwordMsg').innerText = '';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }
        async function submitPasswordChange() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            if (!currentPassword || !newPassword) {
                document.getElementById('passwordMsg').innerText = 'الرجاء إدخال كلمة المرور الحالية والجديدة';
                return;
            }
            if (newPassword.length < 6) {
                document.getElementById('passwordMsg').innerText = 'كلمة المرور الجديدة يجب أن تكون 6 أحرف على الأقل';
                return;
            }
            try {
                const res = await fetch('/api/admin/change-password', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        currentPassword,
                        newPassword
                    })
                });
                if (res.ok) {
                    alert('تم تغيير كلمة المرور بنجاح');
                    closePasswordModal();
                } else {
                    const error = await res.text();
                    document.getElementById('passwordMsg').innerText = error || 'فشل تغيير كلمة المرور';
                }
            } catch (err) {
                document.getElementById('passwordMsg').innerText = 'خطأ في الاتصال بالخادم';
            }
        }

        // ربط الأزرار
        document.getElementById('changePasswordBtn').addEventListener('click', openPasswordModal);

        // الوضع الليلي من localStorage
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        // إضافة زر الوضع الليلي (اختياري، يمكن إضافته عبر CSS موجود مسبقاً)
        if (!document.querySelector('.dark-mode-toggle')) {
            const btn = document.createElement('div');
            btn.className = 'dark-mode-toggle';
            btn.innerHTML = '🌙';
            btn.onclick = toggleDarkMode;
            document.body.appendChild(btn);
        }

        loadDashboard();
    </script>
</body>

</html>
